<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-label="Psychosis">
  <rect width="480" height="180" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Psychosis</text>
  <rect x="80" y="52" width="140" height="56" rx="8" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="150" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Hallucinations</text>
  <text x="150" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">false perceptions</text>
  <rect x="260" y="52" width="140" height="56" rx="8" fill="#fce7f3" stroke="#db2777"/>
  <text x="330" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Delusions</text>
  <text x="330" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">fixed false beliefs</text>
  <text x="240" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Schizophrenia, steroid psychosis, stimulants, Wernicke</text>
  <text x="240" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Disorganized thought/speech may accompany</text>
</svg>
