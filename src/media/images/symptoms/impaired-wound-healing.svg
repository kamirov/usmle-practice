<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-label="Impaired wound healing">
  <rect width="480" height="180" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Impaired wound healing</text>
  <rect x="160" y="55" width="160" height="50" rx="6" fill="#fecaca" stroke="#dc2626" stroke-dasharray="6 4"/>
  <path d="M180 80 H300" stroke="#dc2626" stroke-width="2"/>
  <text x="240" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Delayed closure, poor granulation, infection risk</text>
  <text x="240" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Glucocorticoids ď fibroblast activity and collagen synthesis</text>
  <text x="240" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Also: diabetes, malnutrition, venous stasis, immunosuppression</text>
</svg>
