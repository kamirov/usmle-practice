<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-label="Mania">
  <rect width="480" height="180" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Mania</text>
  <text x="240" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12">‘ mood, energy, goal-directed activity</text>
  <text x="120" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Decreased sleep need</text>
  <text x="240" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Pressured speech</text>
  <text x="360" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Grandiosity</text>
  <text x="120" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Flight of ideas</text>
  <text x="240" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Risky behavior</text>
  <text x="360" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Distractibility</text>
  <text x="240" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Bipolar I; steroids and levodopa can induce mania</text>
</svg>
