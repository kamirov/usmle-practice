<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Antipsychotic dopamine pathway effects</title>
  <desc id="desc">D2 blockade reduces mesolimbic psychosis but causes nigrostriatal EPS and tuberoinfundibular hyperprolactinemia.</desc>
  <rect width="900" height="520" fill="#f8fafc"/>
  <rect x="48" y="48" width="804" height="424" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="450" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Antipsychotics: D₂ Blockade</text>
  <text x="450" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#374151">Therapeutic target and high-yield adverse effect pathways</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#111827">
    <circle cx="170" cy="244" r="54" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <text x="170" y="238" text-anchor="middle" font-weight="700">VTA</text>
    <text x="170" y="263" text-anchor="middle" font-size="15">dopamine</text>
    <path d="M226 214 C330 150 432 148 550 214" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
    <rect x="590" y="164" width="190" height="92" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <text x="685" y="201" text-anchor="middle" font-weight="700">Mesolimbic</text>
    <text x="685" y="228" text-anchor="middle" font-size="16">↓ positive symptoms</text>
    <path d="M226 260 C330 320 432 332 550 282" fill="none" stroke="#dc2626" stroke-width="5" marker-end="url(#arrowRed)"/>
    <rect x="590" y="272" width="190" height="92" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
    <text x="685" y="309" text-anchor="middle" font-weight="700">Nigrostriatal</text>
    <text x="685" y="336" text-anchor="middle" font-size="16">EPS / tardive dyskinesia</text>
    <path d="M170 302 V390 H550" fill="none" stroke="#b45309" stroke-width="5" marker-end="url(#arrowAmber)"/>
    <rect x="590" y="374" width="190" height="64" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="4"/>
    <text x="685" y="413" text-anchor="middle" font-weight="700">↑ Prolactin</text>
  </g>
  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/></marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#dc2626"/></marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#b45309"/></marker>
  </defs>
</svg>
