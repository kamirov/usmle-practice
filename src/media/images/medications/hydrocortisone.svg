  <rect x="60" y="52" width="150" height="48" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="135" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Glucocorticoid</text>
