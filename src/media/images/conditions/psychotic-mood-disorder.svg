<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-label="Psychotic mood disorder">
  <rect width="480" height="180" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Psychotic mood disorder</text>
  <rect x="80" y="55" width="140" height="48" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="150" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Mood episode</text>
  <text x="150" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">mania or depression</text>
  <rect x="260" y="55" width="140" height="48" rx="8" fill="#fce7f3" stroke="#db2777"/>
  <text x="330" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Psychosis</text>
  <text x="330" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">only with mood</text>
  <path d="M220 79 H260" stroke="#334155" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker></defs>
  <text x="240" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Delusions/hallucinations mood-congruent  vs schizophrenia</text>
  <text x="240" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Psychotic depression or mania; schizoaffective if psychosis persists</text>
</svg>
