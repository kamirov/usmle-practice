<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" role="img" aria-label="Schizotypal personality disorder">
  <rect width="480" height="180" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Schizotypal personality disorder</text>
  <circle cx="240" cy="90" r="36" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="200" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14">?</text>
  <text x="280" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14">&</text>
  <text x="240" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">odd ideas</text>
  <text x="240" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Cluster A  magical thinking, odd speech, social anxiety, eccentric behavior</text>
  <text x="240" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">‘ risk schizophrenia; no sustained psychosis required for diagnosis</text>
</svg>
