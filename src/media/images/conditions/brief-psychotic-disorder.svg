<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-label="Brief psychotic disorder">
  <rect width="480" height="160" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Brief psychotic disorder</text>
  <rect x="100" y="55" width="280" height="36" rx="6" fill="#fce7f3" stroke="#db2777"/>
  <text x="240" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Psychosis &lt; 1 month</text>
  <text x="240" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Hallucinations, delusions, disorganized speech</text>
  <text x="240" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Often postpartum or after severe stressor  full recovery</text>
</svg>
