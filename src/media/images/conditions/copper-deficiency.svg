<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Copper deficiency">
  <rect width="480" height="200" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Copper deficiency</text>
  <rect x="60" y="55" width="100" height="44" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="110" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">“ ceruloplasmin</text>
  <rect x="190" y="55" width="100" height="44" rx="6" fill="#fecaca" stroke="#dc2626"/>
  <text x="240" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">“ lysyl oxidase</text>
  <rect x="320" y="55" width="100" height="44" rx="6" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="370" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">“ cytochrome c oxidase</text>
  <text x="240" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Neuropathy, anemia (sideroblastic), neutropenia</text>
  <text x="240" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Zinc excess, malabsorption, TPN without copper</text>
  <text x="240" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">vs Wilson  copper overload, Kayser-Fleischer rings</text>
</svg>
