<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" role="img" aria-label="Neuromyelitis optica">
  <rect width="480" height="220" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Neuromyelitis optica (NMO)</text>
  <ellipse cx="120" cy="90" rx="50" ry="36" fill="#dbeafe" stroke="#2563eb"/>
  <text x="120" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Optic nerve</text>
  <text x="120" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">optic neuritis</text>
  <rect x="220" y="50" width="40" height="140" rx="12" fill="#e2e8f0" stroke="#64748b"/>
  <rect x="228" y="70" width="24" height="100" rx="4" fill="#fecaca" stroke="#dc2626"/>
  <text x="300" y="86" text-anchor="start" font-family="system-ui,sans-serif" font-size="11">Longitudinally extensive</text>
  <text x="300" y="104" text-anchor="start" font-family="system-ui,sans-serif" font-size="11">transverse myelitis (e3 segments)</text>
  <text x="300" y="130" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#dc2626">Anti-AQP4 IgG (NMO-IgG)</text>
  <text x="240" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">vs MS: fewer brain lesions, LETM, AQP4+</text>
  <text x="240" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Treat: rituximab, eculizumab, plasma exchange</text>
</svg>
