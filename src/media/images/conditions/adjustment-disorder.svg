<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-label="Adjustment disorder">
  <rect width="480" height="160" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Adjustment disorder</text>
  <rect x="140" y="50" width="80" height="40" rx="6" fill="#fecaca" stroke="#dc2626"/>
  <text x="180" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Stressor</text>
  <path d="M220 70 H260" stroke="#334155" marker-end="url(#a)"/>
  <rect x="260" y="50" width="80" height="40" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="300" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10">Symptoms</text>
  <defs><marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker></defs>
  <text x="240" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Emotional/behavioral response within 3 months of identifiable stressor</text>
  <text x="240" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Resolves within 6 months after stressor ends  out of proportion but sub-threshold for MDD</text>
</svg>
