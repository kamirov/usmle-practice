<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Avascular necrosis">
  <rect width="480" height="200" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Avascular necrosis</text>
  <path d="M200 60 L280 60 L300 140 L180 140 Z" fill="#e2e8f0" stroke="#64748b"/>
  <ellipse cx="240" cy="85" rx="35" ry="25" fill="#fecaca" stroke="#dc2626"/>
  <text x="240" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#dc2626">necrotic</text>
  <text x="240" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#dc2626">femoral head</text>
  <text x="240" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Ischemic bone death  femoral head classic</text>
  <text x="240" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Steroids, sickle cell, alcohol, trauma, idiopathic</text>
